name: Claude PR Review (Reusable)

# SECURITY REVIEW:
# - github.head_ref is used in env: var HEAD_REF (safe, not shell-interpolated)
# - github.event.pull_request.number is used in prompt: input (safe, action param)
#   and in env: vars (safe)
# - No untrusted input is used directly in run: blocks

on:
  # Direct dispatch from feedback-app (cross-org via /api/agent-callback/repo-token).
  # Runs in this repo, operates on inputs.repo_full_name / inputs.pr_number.
  workflow_dispatch:
    inputs:
      repo_full_name:
        description: 'Target repo (owner/name)'
        type: string
        required: true
      pr_number:
        description: 'PR number on the target repo'
        type: string
        required: true
      issue_number:
        description: 'Linked feature issue number (Gate 4 label + callback)'
        type: string
        required: false
      plane_issue_id:
        description: >
          Plane issue id (résolu par feedback-app au dispatch). Nourrit
          POST /api/agent-callback/review — pas de résolution Plane possible
          depuis ce workflow (cross-org, pas de creds Plane ici). Absent en
          mode workflow_call : la passe de review structurée (6 critères) est
          alors sautée, seuls le commentaire PR + le label gate 4 sont posés.
        type: string
        required: false
      base_branch:
        description: 'Branch checked out to read project docs'
        type: string
        default: 'recette'
      project_name:
        type: string
        required: true
      model:
        type: string
        default: 'claude-sonnet-4-6'
      max_turns:
        type: number
        default: 100
      extra_review_rules:
        type: string
        default: ''
  # Thin-caller path (unchanged). Inputs empty -> fall back to github.event.*
  workflow_call:
    inputs:
      project_name:
        type: string
        required: true
      model:
        type: string
        default: 'claude-sonnet-4-6'
      max_turns:
        type: number
        default: 100
      extra_review_rules:
        description: 'Extra project-specific review rules'
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      AGENT_CALLBACK_SECRET:
        required: false

jobs:
  review:
    runs-on: self-hosted
    timeout-minutes: 15
    concurrency:
      group: claude-pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write  # pose le label ai-review-pass/fail sur l'issue liee (Gate 4)
      id-token: write

    steps:
      # -- Fetch target-repo token (dispatch mode only) --
      - name: Fetch target repo token
        id: repo_token
        if: inputs.repo_full_name != ''
        env:
          CALLBACK_URL: ${{ vars.FEEDBACK_APP_URL }}
          CALLBACK_SECRET: ${{ secrets.AGENT_CALLBACK_SECRET }}
          REPO_FULL_NAME: ${{ inputs.repo_full_name }}
        run: |
          if [ -z "$CALLBACK_URL" ] || [ -z "$CALLBACK_SECRET" ]; then
            echo "::error::FEEDBACK_APP_URL / AGENT_CALLBACK_SECRET requis (dispatch)"
            exit 1
          fi
          OWNER="${REPO_FULL_NAME%%/*}"
          NAME="${REPO_FULL_NAME##*/}"
          RESP=$(curl -sS -X POST "$CALLBACK_URL/api/agent-callback/repo-token" \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg o "$OWNER" --arg n "$NAME" '{owner:$o,repo:$n}')")
          TOKEN=$(echo "$RESP" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then echo "::error::pas de token pour $REPO_FULL_NAME"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # -- Resolve context: repo / pr_number / head_ref / head_sha across both modes --
      - name: Resolve context
        id: ctx
        env:
          GH_TOKEN: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          INPUT_REPO: ${{ inputs.repo_full_name }}
          INPUT_PR: ${{ inputs.pr_number }}
          INPUT_PLANE_ISSUE_ID: ${{ inputs.plane_issue_id }}
          EVENT_REPO: ${{ github.repository }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          EVENT_HEAD: ${{ github.head_ref }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -n "$INPUT_REPO" ]; then
            REPO="$INPUT_REPO"; PR="$INPUT_PR"
            PR_JSON=$(gh pr view "$PR" --repo "$REPO" --json headRefName,headRefOid)
            HEAD=$(echo "$PR_JSON" | jq -r '.headRefName')
            HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')
          else
            REPO="$EVENT_REPO"; PR="$EVENT_PR"; HEAD="$EVENT_HEAD"; HEAD_SHA="$EVENT_HEAD_SHA"
          fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "owner=${REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${REPO##*/}" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "plane_issue_id=$INPUT_PLANE_ISSUE_ID" >> "$GITHUB_OUTPUT"

      # -- Report run id to feedback-app (dispatch only) --
      - name: Report run id to feedback-app
        if: inputs.repo_full_name != ''
        continue-on-error: true
        env:
          CALLBACK_URL: ${{ vars.FEEDBACK_APP_URL }}
          CALLBACK_SECRET: ${{ secrets.AGENT_CALLBACK_SECRET }}
          REPO_FULL_NAME: ${{ steps.ctx.outputs.repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number || steps.ctx.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
          RUN_REPO: ${{ github.repository }}
        run: |
          if [ -z "$CALLBACK_URL" ] || [ -z "$CALLBACK_SECRET" ]; then exit 0; fi
          OWNER="${REPO_FULL_NAME%%/*}"; NAME="${REPO_FULL_NAME##*/}"
          PAYLOAD=$(jq -nc --arg owner "$OWNER" --arg name "$NAME" \
            --argjson issue "$ISSUE_NUMBER" --argjson runId "$RUN_ID" --arg runRepo "$RUN_REPO" \
            '{repo:{owner:$owner,name:$name},ghIssueNumber:$issue,stage:"pr-review",status:"started",ghRunId:$runId,ghRunRepo:$runRepo}')
          curl -sS -X POST "$CALLBACK_URL/api/agent-callback" \
            -H "Authorization: Bearer $CALLBACK_SECRET" -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "::warning::run-id report failed (non-blocking)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.ctx.outputs.repo }}
          ref: ${{ inputs.base_branch || github.base_ref }}
          token: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Get changed files
        id: changes
        run: |
          FILES=$(gh pr diff "$PR_NUMBER" --name-only)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          CODE_FILES=$(echo "$FILES" | grep -vE '\.(md|yml|yaml|json|txt)$' || true)
          [ -z "$CODE_FILES" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT
          echo "$FILES" | grep -q 'supabase/migrations/' 2>/dev/null \
            && echo "has_migration=true" >> $GITHUB_OUTPUT \
            || echo "has_migration=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}

      - name: Detect linked issue
        id: issue
        if: steps.changes.outputs.skip != 'true'
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body // ""')
          ISSUE_NUM=""
          if [[ "$HEAD_REF" =~ ^claude/issue-([0-9]+) ]]; then
            ISSUE_NUM="${BASH_REMATCH[1]}"
          fi
          if [ -z "$ISSUE_NUM" ] && [ -n "$PR_BODY" ]; then
            ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?:Closes|Fixes|Resolves)\s*#(\d+)' | head -1 | grep -oP '\d+' || true)
          fi
          if [ -n "$ISSUE_NUM" ]; then
            echo "has_issue=true" >> $GITHUB_OUTPUT
            echo "number=$ISSUE_NUM" >> $GITHUB_OUTPUT
            ISSUE_DATA=$(gh issue view "$ISSUE_NUM" --json title,body -q '.' 2>/dev/null || echo "")
            [ -n "$ISSUE_DATA" ] && { echo "data<<EOF" >> $GITHUB_OUTPUT; echo "$ISSUE_DATA" >> $GITHUB_OUTPUT; echo "EOF" >> $GITHUB_OUTPUT; }
            TEST_PLAN=$(gh issue view "$ISSUE_NUM" --json comments --jq '
              .comments | map(select(.body | contains("TEST-PLAN-START"))) | last | .body // empty
            ' 2>/dev/null | sed -n '/<!-- TEST-PLAN-START -->/,/<!-- TEST-PLAN-END -->/p' | sed '1d;$d')
            [ -n "$TEST_PLAN" ] && { echo "has_test_plan=true" >> $GITHUB_OUTPUT; echo "test_plan<<EOF" >> $GITHUB_OUTPUT; echo "$TEST_PLAN" >> $GITHUB_OUTPUT; echo "EOF" >> $GITHUB_OUTPUT; } || echo "has_test_plan=false" >> $GITHUB_OUTPUT
          else
            echo "has_issue=false" >> $GITHUB_OUTPUT
            echo "has_test_plan=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          HEAD_REF: ${{ steps.ctx.outputs.head_ref }}

      - name: Discover docs
        if: steps.changes.outputs.skip != 'true'
        id: docs
        run: |
          INSTRUCTIONS=""
          for f in CLAUDE*.md; do [ -f "$f" ] && INSTRUCTIONS="${INSTRUCTIONS}\n- \`$f\`"; done
          echo "read_list<<EOF" >> $GITHUB_OUTPUT
          echo -e "$INSTRUCTIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # -- Monter le catalogue de skills (skills/README.md "Montage") --
      # Nécessaire pour que l'orchestrateur pr-review + les briques qu'il
      # compose (code-review, zoom-out, caveman, codebase-design,
      # domain-modeling, tdd, handoff) et securite-tenant existent dans le
      # workspace du repo cible.
      - name: Monter le catalogue de skills
        if: steps.changes.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: AlexandreScouad/claude-workflows
          ref: ${{ github.sha }}
          path: .claude-workflows-skills
          sparse-checkout: skills

      - name: Installer les skills dans le workspace cible
        if: steps.changes.outputs.skip != 'true'
        run: |
          mkdir -p .claude/skills
          for src in .claude-workflows-skills/skills/vendor .claude-workflows-skills/skills; do
            for d in "$src"/*/; do
              name=$(basename "$d")
              [ "$name" = "vendor" ] && continue
              rm -rf ".claude/skills/$name"
              cp -R "$d" ".claude/skills/$name"
            done
          done
          rm -rf .claude-workflows-skills

      - name: Claude review
        if: steps.changes.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          allowed_bots: "makeplane[bot]"
          # track_progress unsupported on workflow_dispatch; keep prior behaviour otherwise.
          track_progress: ${{ github.event_name != 'workflow_dispatch' && 'true' || 'false' }}
          prompt: |
            Review de la PR #${{ steps.ctx.outputs.pr_number }} du projet ${{ inputs.project_name }} —
            chaîne de review des 6 critères.

            Lis et suis `.claude/skills/pr-review/SKILL.md` : c'est l'orchestrateur qui
            compose les briques (code-review, zoom-out, caveman, codebase-design,
            domain-modeling, tdd, handoff) et le skill securite-tenant pour produire les
            6 verdicts. Ce prompt ne fournit que le contexte que le skill ne peut pas
            se procurer lui-même.

            ## Fichiers modifies
            ```
            ${{ steps.changes.outputs.files }}
            ```

            ## Contexte

            1. `gh pr diff ${{ steps.ctx.outputs.pr_number }}` — diff complet
            2. `gh pr view ${{ steps.ctx.outputs.pr_number }}` — métadonnées PR
            3. Docs projet à lire (critère 3, bon endroit) :
            ${{ steps.docs.outputs.read_list }}
            4. Precheck (reformulation validée, critère 1) : pas de source connue
               aujourd'hui pour ce projet — le skill le traite en dégradé (voir §1 du
               skill). Ne pas construire d'infra de replay navigateur ici.

            ${{ steps.changes.outputs.has_migration == 'true' && '5. Cette PR touche une migration DB — critère 6, appliquer aussi `docs/agents/db-migrations.md` du repo cible.' || '' }}

            ${{ inputs.extra_review_rules }}

            ## Critère 1 — critères d'acceptation de l'issue liée

            ${{ steps.issue.outputs.has_issue == 'true' && format('Issue liee : #{0}\n{1}\n\nPour CHAQUE critere d''acceptation, verifie dans le diff :\n- COUVERT : implemente et fonctionne\n- PARTIEL : partiellement implemente\n- MANQUANT : pas du tout adresse\n- NON APPLICABLE : ne concerne pas cette PR', steps.issue.outputs.number, steps.issue.outputs.data) || 'Pas d''issue liee detectee.' }}

            ## Critère 1 — plan de test approuvé

            ${{ steps.issue.outputs.has_test_plan == 'true' && format('Plan de test :\n{0}\n\nPour CHAQUE scenario, verifie dans le code :\n- VERIFIE : couvert par le code\n- NON VERIFIE : non couvert\n- NON APPLICABLE : non pertinent pour cette PR', steps.issue.outputs.test_plan) || 'Pas de plan de test structure trouve.' }}

            ## Sortie attendue (étape 3 du skill pr-review)

            1. Un commentaire PR (`gh pr comment`) au format :

            ```markdown
            ## 🔍 Review — PR #${{ steps.ctx.outputs.pr_number }}

            ### Résumé
            [2-3 phrases]

            ### Les 6 critères
            | # | Critère | Verdict | Résumé |
            |---|---------|---------|--------|
            | 1 | Fait ce que le ticket demande | ✅ pass / ⚠️ warn / ❌ fail | ... |
            | 2 | Ne fait que ça | ... | ... |
            | 3 | Bon endroit | ... | ... |
            | 4 | Prouvé par des tests | ... | ... |
            | 5 | Sûre | ... | ... |
            | 6 | Réversible & lisible | ... | ... |

            [Findings détaillés avec fichier:ligne et scénario, par critère en fail/warn]

            ### Critères d'acceptation
            | # | Critère | Statut |
            |---|---------|--------|
            | 1 | ... | COUVERT/PARTIEL/MANQUANT |

            ### Plan de test
            | # | Scénario | Statut |
            |---|----------|--------|
            | 1 | ... | VERIFIE/NON VERIFIE |
            ```

            2. Le fichier `.claude-pr-review-verdicts.json` (Write, racine du workspace) :
               `{"verdicts": [...]}`, exactement les 6 objets `{criterion, verdict,
               summary, findings}` du skill — même évaluation que le commentaire
               ci-dessus, jamais un recalcul divergent.

          claude_args: '--model ${{ inputs.model }} --max-turns ${{ inputs.max_turns }}'

      # Derive le label gate 4 depuis les verdicts structures des 6 criteres
      # (.claude-pr-review-verdicts.json, ecrit par l'etape ci-dessus) : >=1
      # fail -> ai-review-fail, sinon ai-review-pass. Fallback sur l'ancien
      # parsing du commentaire markdown si le fichier est absent/invalide
      # (l'agent n'a pas ecrit le JSON — ne pas perdre le label pour autant).
      # Quality Gate 4 cote feedback-app ecoute `issues.labeled` (PAS
      # `pull_request.labeled`), donc le label va sur l'issue de feature
      # (steps.issue.outputs.number), pas sur la PR.
      - name: Post gate-4 verdict label
        if: steps.changes.outputs.skip != 'true' && steps.issue.outputs.has_issue == 'true'
        env:
          GH_TOKEN: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          REPO: ${{ steps.ctx.outputs.repo }}
        run: |
          LABEL=""
          if [ -f .claude-pr-review-verdicts.json ] && jq -e '.verdicts | length > 0' .claude-pr-review-verdicts.json >/dev/null 2>&1; then
            FAIL_COUNT=$(jq '[.verdicts[] | select(.verdict == "fail")] | length' .claude-pr-review-verdicts.json)
            [ "$FAIL_COUNT" -gt 0 ] && LABEL="ai-review-fail" || LABEL="ai-review-pass"
            echo "Verdicts structures : $FAIL_COUNT critere(s) en fail."
          else
            # Fallback : parse le dernier commentaire de review (marqueur "Review — PR").
            # Le corps vient de l'API GitHub (donnee non fiable) : on le garde dans
            # une variable shell et on le parse avec grep — jamais d'eval.
            BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
              --jq '[.comments[] | select(.body | contains("Review — PR"))] | last | .body // ""')
            if [ -z "$BODY" ]; then
              echo "Ni JSON de verdicts ni commentaire de review — pas de label gate 4."
              exit 0
            fi
            VERDICT_LINE=$(printf '%s\n' "$BODY" | grep -iE '^#+[[:space:]]*Verdict' | head -1)
            case "$VERDICT_LINE" in
              *"CORRECTIONS REQUISES"*|*REPLANIFICATION*) LABEL="ai-review-fail" ;;
              *APPROVE*|*"CORRECTIONS MINEURES"*)         LABEL="ai-review-pass" ;;
            esac
          fi
          if [ -z "$LABEL" ]; then
            echo "Verdict non reconnu — aucun label pose."
            exit 0
          fi
          [ "$LABEL" = "ai-review-fail" ] && OPP="ai-review-pass" || OPP="ai-review-fail"
          gh label create ai-review-pass --repo "$REPO" --color "0E8A16" \
            --description "Review IA : approuve" 2>/dev/null || true
          gh label create ai-review-fail --repo "$REPO" --color "D73A4A" \
            --description "Review IA : corrections requises" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "$OPP" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "$LABEL"
          echo "Pose $LABEL sur l'issue #$ISSUE_NUMBER"

      # Poste la passe complete des 6 criteres en DB (review_runs/review_verdicts,
      # feedback-app#178) — flag reviewChainEnabled evalue cote serveur (OFF =
      # no-op 200). Best-effort : le chemin label ci-dessus reste la source
      # gate 4 authoritative independamment du succes de cet appel.
      #
      # Necessite plane_issue_id, uniquement connu en mode workflow_dispatch
      # (resolu par feedback-app depuis sa DB au moment du dispatch — ce
      # workflow n'a pas de credentials Plane). En mode workflow_call, cette
      # etape est sautee : la passe structuree des 6 criteres n'existe pas
      # encore pour ce mode, seuls le commentaire PR + le label gate 4 le sont.
      - name: Post review verdicts (6 criteres)
        if: steps.changes.outputs.skip != 'true' && steps.ctx.outputs.plane_issue_id != ''
        continue-on-error: true
        env:
          CALLBACK_URL: ${{ vars.FEEDBACK_APP_URL }}
          CALLBACK_SECRET: ${{ secrets.AGENT_CALLBACK_SECRET }}
          REPO_OWNER: ${{ steps.ctx.outputs.owner }}
          REPO_NAME: ${{ steps.ctx.outputs.name }}
          PLANE_ISSUE_ID: ${{ steps.ctx.outputs.plane_issue_id }}
          GH_PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
          MODEL: ${{ inputs.model }}
        run: |
          if [ -z "$CALLBACK_URL" ] || [ -z "$CALLBACK_SECRET" ]; then
            echo "FEEDBACK_APP_URL / AGENT_CALLBACK_SECRET absents — pas de passe DB (non-bloquant)."
            exit 0
          fi
          if [ ! -f .claude-pr-review-verdicts.json ] || ! jq -e '.verdicts | length > 0' .claude-pr-review-verdicts.json >/dev/null 2>&1; then
            echo "Pas de .claude-pr-review-verdicts.json exploitable — pas de passe DB (non-bloquant)."
            exit 0
          fi
          PAYLOAD=$(jq -nc \
            --arg owner "$REPO_OWNER" --arg name "$REPO_NAME" \
            --arg planeIssueId "$PLANE_ISSUE_ID" --argjson ghPrNumber "$GH_PR_NUMBER" \
            --arg headSha "$HEAD_SHA" --arg model "$MODEL" \
            --slurpfile v .claude-pr-review-verdicts.json \
            '{repo:{owner:$owner,name:$name},planeIssueId:$planeIssueId,ghPrNumber:$ghPrNumber,
              headSha:$headSha,scope:"full",trigger:"dispatch",model:$model,
              verdicts:$v[0].verdicts}')
          curl -sS -X POST "$CALLBACK_URL/api/agent-callback/review" \
            -H "Authorization: Bearer $CALLBACK_SECRET" -H "Content-Type: application/json" \
            -d "$PAYLOAD" && echo "::notice::passe des 6 criteres postee" \
            || echo "::warning::POST review-verdicts echoue (non-bloquant)"

      - name: Notify feedback-app
        if: always()
        env:
          AGENT_CALLBACK_SECRET: ${{ secrets.AGENT_CALLBACK_SECRET }}
          FEEDBACK_APP_URL: ${{ vars.FEEDBACK_APP_URL || 'https://feedback.scouad.fr' }}
          REPO_OWNER: ${{ steps.ctx.outputs.owner }}
          REPO_NAME: ${{ steps.ctx.outputs.name }}
          ISSUE_NUMBER: ${{ inputs.issue_number || steps.ctx.outputs.pr_number }}
          STAGE: pr-review
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$AGENT_CALLBACK_SECRET" ]; then
            echo "AGENT_CALLBACK_SECRET not set — skipping feedback-app notify"
            exit 0
          fi
          case "$JOB_STATUS" in
            success)   STATUS="completed" ;;
            # Annulation (concurrency:cancel-in-progress) ≠ échec — cf.
            # COCKP-1197. On ne notifie rien : le run survivant enverra son
            # propre callback.
            cancelled) echo "::notice::job cancelled (concurrency) — pas de callback d'échec"; exit 0 ;;
            *)         STATUS="failed" ;;
          esac
          PAYLOAD=$(jq -nc \
            --arg owner "$REPO_OWNER" \
            --arg name "$REPO_NAME" \
            --argjson issue "$ISSUE_NUMBER" \
            --arg stage "$STAGE" \
            --arg status "$STATUS" \
            '{repo:{owner:$owner,name:$name},ghIssueNumber:$issue,stage:$stage,status:$status}')
          curl -sS -X POST "$FEEDBACK_APP_URL/api/agent-callback" \
            -H "Authorization: Bearer $AGENT_CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            || echo "[notify] callback failed (non-blocking)"
