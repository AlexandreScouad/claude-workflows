name: Claude Estimate (Reusable)
# Security note: github.event.issue.title/body are used ONLY in:
# 1. prompt: input of claude-code-action (safe, string parameter)
# 2. env: vars consumed by printf with --data-urlencode (safe)

on:
  workflow_call:
    inputs:
      base_branch:
        type: string
        default: 'recette'
      project_name:
        type: string
        required: true
      estimation_grid:
        description: 'Custom estimation grid (markdown table). Empty = standard Scouad grid.'
        type: string
        default: ''
      model:
        type: string
        default: 'claude-sonnet-4-6'
      max_turns:
        type: number
        default: 30
      extra_prompt:
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      PLANE_API_TOKEN:
        required: false

jobs:
  estimate:
    runs-on: self-hosted
    timeout-minutes: 15
    concurrency:
      group: claude-estimate-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Check if already estimated
        id: check
        run: |
          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "^estimated$"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 1

      - name: Estimate with Claude
        if: steps.check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "makeplane[bot]"
          allowed_tools: "Bash(cat *),Bash(echo *),Bash(printf *),Glob,Grep,Read,Write"
          prompt: |
            Estime la taille de cette issue avec une analyse structuree.

            ## Issue #${{ github.event.issue.number }}
            **Titre** : ${{ github.event.issue.title }}
            **Description** :
            ${{ github.event.issue.body }}

            ## Phase 1 — EXPLORATION

            Utilise Glob, Grep, Read pour :
            - Identifier TOUS les fichiers qui devront etre modifies ou crees
            - Comprendre la complexite de chaque modification
            - Detecter les dependances (DB, API, types partages)
            - Verifier s'il existe des implementations similaires reutilisables

            ## Phase 2 — DECOMPOSITION EN TACHES ATOMIQUES

            Decompose l'issue en taches atomiques (1 commit = 1 tache, 1-3 fichiers).
            Pour chaque tache, evalue :
            - Complexite (trivial / simple / moyen / complexe)
            - Risque de regression
            - Done criteria (comment verifier que c'est fait)

            ## Phase 3 — CLASSIFICATION

            Grille T-shirt :
            | Taille | Criteres | Prix HT | Delai |
            |--------|----------|---------|-------|
            | XXS | 1 fichier, visuel uniquement, 1 tache | 20 EUR | 24h |
            | XS | 1-2 fichiers, logique simple, 1-2 taches | 50 EUR | 24h |
            | S | 2-3 fichiers, correction avancee, 2-3 taches | 100 EUR | 48h |
            | M | 3-5 fichiers, fonctionnalite ciblee, 3-5 taches | 200 EUR | 3j ouvres |
            | L | 5-10 fichiers, multi-composants, 5-8 taches | 400 EUR | 5j ouvres |
            | XL | 10+ fichiers, front+back+DB, 8-12 taches | 600 EUR | 1 semaine |
            | XXL | Architecture majeure, 12+ taches | 1500 EUR+ | Planning dedie |

            Facteurs de majoration : changements DB (+1 taille), risque regression eleve (+1), complexite UI (+1).
            En cas de doute, prefere la taille superieure.

            ## Phase 4 — SCORE DE CONFIANCE

            Evalue ta confiance (0-100) :
            - Clarte du scope (25pts) : les criteres d'acceptation sont-ils clairs ?
            - Completude de l'exploration (25pts) : as-tu identifie tous les fichiers ?
            - Fiabilite de la decomposition (25pts) : les taches sont-elles bien decoupees ?
            - Risque maitrise (25pts) : les risques sont-ils identifies et mitigables ?

            ${{ inputs.extra_prompt }}

            ## SORTIE

            Ecris UNIQUEMENT /tmp/estimate-result.json (Write tool) :
            ```json
            {
              "taille": "M",
              "categorie": "Amelioration",
              "prix": "200 EUR",
              "delai": "3j ouvres",
              "nb_taches": 4,
              "nb_fichiers": 5,
              "justification": "- Tache 1: ... (simple)\n- Tache 2: ... (moyen)\n- ...",
              "fichiers": "- src/path/file1.tsx (modification)\n- src/path/file2.ts (creation)",
              "risques": "- Risque 1 → mitigation\n- Risque 2 → mitigation",
              "confidence_score": 85,
              "done_criteria": "- Critere 1 verifiable\n- Critere 2 verifiable"
            }
            ```

          claude_args: '--model ${{ inputs.model }} --max-turns ${{ inputs.max_turns }}'

      - name: Send to Telegram
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          [ ! -f /tmp/estimate-result.json ] && exit 0
          jq empty /tmp/estimate-result.json 2>/dev/null || exit 0
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0

          TAILLE=$(jq -r '.taille' /tmp/estimate-result.json)
          PRIX=$(jq -r '.prix' /tmp/estimate-result.json)
          DELAI=$(jq -r '.delai' /tmp/estimate-result.json)
          JUSTIFICATION=$(jq -r '.justification' /tmp/estimate-result.json)
          TAILLE_LOWER=$(echo "$TAILLE" | tr '[:upper:]' '[:lower:]')

          TEXT="ESTIMATION ${PROJECT_NAME} — Issue #${ISSUE_NUMBER}
          ${ISSUE_TITLE}

          Taille: ${TAILLE} | Prix: ${PRIX} | Delai: ${DELAI}
          ${JUSTIFICATION}

          Label: size/${TAILLE_LOWER}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          PROJECT_NAME: ${{ inputs.project_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Remove estimate-ready label
        if: always() && steps.check.outputs.skip != 'true'
        run: gh issue edit "$ISSUE_NUMBER" --remove-label "estimate-ready"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

  sync-to-plane:
    if: github.event.label.name == 'estimate-approved'
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      issues: write

    steps:
      - name: Extract size and map to points
        id: size
        run: |
          SIZE_LABEL=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
            --json labels --jq '.labels[].name' | grep '^size/' | head -1)
          [ -z "$SIZE_LABEL" ] && echo "::error::No size/* label" && exit 1
          SIZE=$(echo "$SIZE_LABEL" | sed 's/size\///')
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          case "$SIZE" in
            xxs) echo "point=1" ;; xs) echo "point=2" ;; s) echo "point=3" ;;
            m) echo "point=5" ;; l) echo "point=8" ;; xl) echo "point=13" ;;
            xxl) echo "point=21" ;; *) echo "point=0" ;;
          esac >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

      - name: Update Plane work item
        run: |
          RESPONSE=$(curl -s \
            -H "x-api-key: $PLANE_API_TOKEN" \
            "$PLANE_BASE_URL/api/v1/workspaces/$PLANE_WORKSPACE/projects/$PLANE_PROJECT_ID/issues/?external_source=github&external_id=$ISSUE_NUMBER")
          WORK_ITEM_ID=$(echo "$RESPONSE" | jq -r '.results[0].id // empty')
          [ -z "$WORK_ITEM_ID" ] && echo "::warning::No Plane item found" && exit 0
          curl -s -X PATCH \
            -H "x-api-key: $PLANE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"estimate_point\": \"$ESTIMATE_POINT\"}" \
            "$PLANE_BASE_URL/api/v1/workspaces/$PLANE_WORKSPACE/projects/$PLANE_PROJECT_ID/issues/$WORK_ITEM_ID/"
        env:
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_BASE_URL: ${{ vars.PLANE_BASE_URL }}
          PLANE_WORKSPACE: ${{ vars.PLANE_WORKSPACE }}
          PLANE_PROJECT_ID: ${{ vars.PLANE_PROJECT_ID }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ESTIMATE_POINT: ${{ steps.size.outputs.point }}

      - name: Swap labels
        run: |
          gh label create "estimated" --color "6f42c1" --description "Estime et synchronise" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "estimated" --remove-label "estimate-approved"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
