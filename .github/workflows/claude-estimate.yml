name: Claude Estimate (Reusable)
# Security note:
# - Issue title/body resolved via Resolve context step (`gh issue view`),
#   exposed as steps.ctx.outputs.* — used in prompt: input (action parameter,
#   not shell) and in env: vars (safe, not shell-interpolated)
# - workflow_dispatch inputs validated by GitHub typing
# - The sync-to-plane job stays event-only (gated on github.event.label.name)

on:
  workflow_dispatch:
    inputs:
      repo_full_name:
        description: 'Target repo (owner/name)'
        type: string
        required: true
      issue_number:
        description: 'GitHub issue number on the target repo'
        type: string
        required: true
      base_branch:
        type: string
        default: 'recette'
      project_name:
        type: string
        required: true
      estimation_grid:
        description: 'Custom estimation grid (markdown table). Empty = standard Scouad grid.'
        type: string
        default: ''
      model:
        type: string
        default: 'claude-sonnet-4-6'
      max_turns:
        type: number
        default: 30
      extra_prompt:
        type: string
        default: ''
  workflow_call:
    inputs:
      base_branch:
        type: string
        default: 'recette'
      project_name:
        type: string
        required: true
      estimation_grid:
        description: 'Custom estimation grid (markdown table). Empty = standard Scouad grid.'
        type: string
        default: ''
      model:
        type: string
        default: 'claude-sonnet-4-6'
      max_turns:
        type: number
        default: 30
      extra_prompt:
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      PLANE_API_TOKEN:
        required: false
      # Bearer secret for POST /api/agent-callback (run-id reporting). Only
      # needed in dispatch mode (read from repo secrets directly); declared
      # here so workflow_call callers may also pass it via `secrets: inherit`.
      AGENT_CALLBACK_SECRET:
        required: false

jobs:
  estimate:
    # Skip in workflow_call mode if the triggering label is `estimate-approved`
    # — that path goes to sync-to-plane, not a re-estimation.
    if: github.event_name == 'workflow_dispatch' || github.event.label.name != 'estimate-approved'
    runs-on: self-hosted
    timeout-minutes: 15
    concurrency:
      group: claude-estimate-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      # ── Fetch target-repo token (dispatch mode) ──
      # En dispatch le run vit dans claude-workflows ; son GITHUB_TOKEN ne peut
      # pas toucher le repo client. On récupère le bon token par-org depuis
      # feedback-app (réutilise github_connections). Skippé en workflow_call.
      - name: Fetch target repo token
        id: repo_token
        if: inputs.repo_full_name != ''
        env:
          CALLBACK_URL: ${{ vars.FEEDBACK_APP_URL }}
          CALLBACK_SECRET: ${{ secrets.AGENT_CALLBACK_SECRET }}
          REPO_FULL_NAME: ${{ inputs.repo_full_name }}
        run: |
          if [ -z "$CALLBACK_URL" ] || [ -z "$CALLBACK_SECRET" ]; then
            echo "::error::FEEDBACK_APP_URL / AGENT_CALLBACK_SECRET requis pour le fetch du token cible (dispatch)"
            exit 1
          fi
          OWNER="${REPO_FULL_NAME%%/*}"
          NAME="${REPO_FULL_NAME##*/}"
          RESP=$(curl -sS -X POST "$CALLBACK_URL/api/agent-callback/repo-token" \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg o "$OWNER" --arg n "$NAME" '{owner:$o,repo:$n}')")
          TOKEN=$(echo "$RESP" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::pas de token pour $REPO_FULL_NAME"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # ── Resolve context ──
      - name: Resolve context
        id: ctx
        env:
          GH_TOKEN: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          INPUT_REPO: ${{ inputs.repo_full_name }}
          INPUT_ISSUE: ${{ inputs.issue_number }}
          EVENT_REPO: ${{ github.repository }}
          EVENT_ISSUE: ${{ github.event.issue.number }}
        run: |
          if [ -n "$INPUT_REPO" ]; then
            REPO="$INPUT_REPO"
            ISSUE="$INPUT_ISSUE"
          else
            REPO="$EVENT_REPO"
            ISSUE="$EVENT_ISSUE"
          fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

          DATA=$(gh issue view "$ISSUE" --repo "$REPO" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title // ""')
          {
            echo "title<<__SCOUAD_EOF__"
            echo "$TITLE"
            echo "__SCOUAD_EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "$DATA" | jq -r '.body // ""' > /tmp/issue-body.txt
          BODY=$(head -c 60000 /tmp/issue-body.txt)
          {
            echo "body<<__SCOUAD_EOF__"
            echo "$BODY"
            echo "__SCOUAD_EOF__"
          } >> "$GITHUB_OUTPUT"

      # ── Report run id to feedback-app (dispatch mode only) ──
      # Lets feedback-app attach THIS GitHub Actions run to its pipeline_run,
      # so the reconcile/runner-health crons read the exact run status
      # (cancelled/timed_out, not just failure) instead of matching by title.
      # Best-effort & non-blocking: skips silently if unconfigured or on error.
      # Only in dispatch mode — in workflow_call mode the run lives on the
      # client repo and is matched there by title.
      - name: Report run id to feedback-app
        if: inputs.repo_full_name != ''
        continue-on-error: true
        env:
          CALLBACK_URL: ${{ vars.FEEDBACK_APP_URL }}
          CALLBACK_SECRET: ${{ secrets.AGENT_CALLBACK_SECRET }}
          REPO_FULL_NAME: ${{ steps.ctx.outputs.repo }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue }}
          RUN_ID: ${{ github.run_id }}
          RUN_REPO: ${{ github.repository }}
        run: |
          if [ -z "$CALLBACK_URL" ] || [ -z "$CALLBACK_SECRET" ]; then
            echo "::notice::agent-callback not configured (FEEDBACK_APP_URL / AGENT_CALLBACK_SECRET) — skipping run-id report"
            exit 0
          fi
          OWNER="${REPO_FULL_NAME%%/*}"
          NAME="${REPO_FULL_NAME##*/}"
          PAYLOAD=$(jq -nc \
            --arg owner "$OWNER" --arg name "$NAME" \
            --argjson issue "$ISSUE_NUMBER" \
            --argjson runId "$RUN_ID" \
            --arg runRepo "$RUN_REPO" \
            '{repo:{owner:$owner,name:$name},ghIssueNumber:$issue,stage:"estimate",status:"started",ghRunId:$runId,ghRunRepo:$runRepo}')
          curl -sS -X POST "$CALLBACK_URL/api/agent-callback" \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "::notice::reported run id $RUN_ID for issue #$ISSUE_NUMBER" \
            || echo "::warning::run-id report failed (non-blocking)"

      - name: Check if already estimated
        id: check
        env:
          GH_TOKEN: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue }}
          REPO: ${{ steps.ctx.outputs.repo }}
        run: |
          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "^estimated$"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.ctx.outputs.repo }}
          ref: ${{ inputs.base_branch }}
          token: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Estimate with Claude
        if: steps.check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ISSUE_TITLE: ${{ steps.ctx.outputs.title }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue }}
          ISSUE_BODY: ${{ steps.ctx.outputs.body }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "makeplane[bot]"
          allowed_tools: "Bash(cat *),Bash(echo *),Bash(printf *),Glob,Grep,Read,Write"
          prompt: |
            Estime la taille de cette issue avec une analyse structuree.

            ## Issue #${{ steps.ctx.outputs.issue }}
            **Titre** : ${{ steps.ctx.outputs.title }}
            **Description** :
            ${{ steps.ctx.outputs.body }}

            ## Phase 1 — EXPLORATION

            Utilise Glob, Grep, Read pour :
            - Identifier TOUS les fichiers qui devront etre modifies ou crees
            - Comprendre la complexite de chaque modification
            - Detecter les dependances (DB, API, types partages)
            - Verifier s'il existe des implementations similaires reutilisables

            ## Phase 2 — DECOMPOSITION EN TACHES ATOMIQUES

            Decompose l'issue en taches atomiques (1 commit = 1 tache, 1-3 fichiers).
            Pour chaque tache, evalue :
            - Complexite (trivial / simple / moyen / complexe)
            - Risque de regression
            - Done criteria (comment verifier que c'est fait)

            ## Phase 3 — CLASSIFICATION

            Grille T-shirt :
            | Taille | Criteres | Prix HT | Delai |
            |--------|----------|---------|-------|
            | XXS | 1 fichier, visuel uniquement, 1 tache | 20 EUR | 24h |
            | XS | 1-2 fichiers, logique simple, 1-2 taches | 50 EUR | 24h |
            | S | 2-3 fichiers, correction avancee, 2-3 taches | 100 EUR | 48h |
            | M | 3-5 fichiers, fonctionnalite ciblee, 3-5 taches | 200 EUR | 3j ouvres |
            | L | 5-10 fichiers, multi-composants, 5-8 taches | 400 EUR | 5j ouvres |
            | XL | 10+ fichiers, front+back+DB, 8-12 taches | 600 EUR | 1 semaine |
            | XXL | Architecture majeure, 12+ taches | 1500 EUR+ | Planning dedie |

            Facteurs de majoration : changements DB (+1 taille), risque regression eleve (+1), complexite UI (+1).
            En cas de doute, prefere la taille superieure.

            ## Phase 4 — SCORE DE CONFIANCE

            Evalue ta confiance (0-100) :
            - Clarte du scope (25pts) : les criteres d'acceptation sont-ils clairs ?
            - Completude de l'exploration (25pts) : as-tu identifie tous les fichiers ?
            - Fiabilite de la decomposition (25pts) : les taches sont-elles bien decoupees ?
            - Risque maitrise (25pts) : les risques sont-ils identifies et mitigables ?

            ${{ inputs.extra_prompt }}

            ## SORTIE

            Ecris UNIQUEMENT /tmp/estimate-result.json (Write tool) :
            ```json
            {
              "taille": "M",
              "categorie": "Amelioration",
              "prix": "200 EUR",
              "delai": "3j ouvres",
              "nb_taches": 4,
              "nb_fichiers": 5,
              "justification": "- Tache 1: ... (simple)\n- Tache 2: ... (moyen)\n- ...",
              "fichiers": "- src/path/file1.tsx (modification)\n- src/path/file2.ts (creation)",
              "risques": "- Risque 1 → mitigation\n- Risque 2 → mitigation",
              "confidence_score": 85,
              "done_criteria": "- Critere 1 verifiable\n- Critere 2 verifiable"
            }
            ```

          claude_args: '--model ${{ inputs.model }} --max-turns ${{ inputs.max_turns }}'

      - name: Send to Telegram
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          [ ! -f /tmp/estimate-result.json ] && exit 0
          jq empty /tmp/estimate-result.json 2>/dev/null || exit 0
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0

          TAILLE=$(jq -r '.taille' /tmp/estimate-result.json)
          PRIX=$(jq -r '.prix' /tmp/estimate-result.json)
          DELAI=$(jq -r '.delai' /tmp/estimate-result.json)
          JUSTIFICATION=$(jq -r '.justification' /tmp/estimate-result.json)
          TAILLE_LOWER=$(echo "$TAILLE" | tr '[:upper:]' '[:lower:]')

          TEXT="ESTIMATION ${PROJECT_NAME} — Issue #${ISSUE_NUMBER}
          ${ISSUE_TITLE}

          Taille: ${TAILLE} | Prix: ${PRIX} | Delai: ${DELAI}
          ${JUSTIFICATION}

          Label: size/${TAILLE_LOWER}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          PROJECT_NAME: ${{ inputs.project_name }}
          ISSUE_TITLE: ${{ steps.ctx.outputs.title }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue }}

      - name: Remove estimate-ready label
        if: always() && steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.repo_token.outputs.token || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue }}
          REPO: ${{ steps.ctx.outputs.repo }}
        run: gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "estimate-ready"

  sync-to-plane:
    if: github.event.label.name == 'estimate-approved'
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      issues: write

    steps:
      - name: Extract size and map to points
        id: size
        run: |
          SIZE_LABEL=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
            --json labels --jq '.labels[].name' | grep '^size/' | head -1)
          [ -z "$SIZE_LABEL" ] && echo "::error::No size/* label" && exit 1
          SIZE=$(echo "$SIZE_LABEL" | sed 's/size\///')
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          case "$SIZE" in
            xxs) echo "point=1" ;; xs) echo "point=2" ;; s) echo "point=3" ;;
            m) echo "point=5" ;; l) echo "point=8" ;; xl) echo "point=13" ;;
            xxl) echo "point=21" ;; *) echo "point=0" ;;
          esac >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

      - name: Update Plane work item
        run: |
          RESPONSE=$(curl -s \
            -H "x-api-key: $PLANE_API_TOKEN" \
            "$PLANE_BASE_URL/api/v1/workspaces/$PLANE_WORKSPACE/projects/$PLANE_PROJECT_ID/issues/?external_source=github&external_id=$ISSUE_NUMBER")
          WORK_ITEM_ID=$(echo "$RESPONSE" | jq -r '.results[0].id // empty')
          [ -z "$WORK_ITEM_ID" ] && echo "::warning::No Plane item found" && exit 0
          curl -s -X PATCH \
            -H "x-api-key: $PLANE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"estimate_point\": \"$ESTIMATE_POINT\"}" \
            "$PLANE_BASE_URL/api/v1/workspaces/$PLANE_WORKSPACE/projects/$PLANE_PROJECT_ID/issues/$WORK_ITEM_ID/"
        env:
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_BASE_URL: ${{ vars.PLANE_BASE_URL }}
          PLANE_WORKSPACE: ${{ vars.PLANE_WORKSPACE }}
          PLANE_PROJECT_ID: ${{ vars.PLANE_PROJECT_ID }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ESTIMATE_POINT: ${{ steps.size.outputs.point }}

      - name: Swap labels
        run: |
          gh label create "estimated" --color "6f42c1" --description "Estime et synchronise" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "estimated" --remove-label "estimate-approved"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
