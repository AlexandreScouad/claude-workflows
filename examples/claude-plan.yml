# Example caller workflow — copy to your project's .github/workflows/
name: Claude Plan

on:
  issues:
    types: [labeled]

jobs:
  plan:
    if: github.event.label.name == 'claude-ready'
    uses: scouad/claude-workflows/.github/workflows/claude-plan.yml@v1
    with:
      base_branch: recette           # or 'develop', 'main'
      project_name: mon-projet       # used in logs
      # auto_approve_threshold: 60   # default 60
      # model: claude-opus-4-6       # default
      # max_turns: 50                # default
      # plane_plan_field_name: 'plan de correction'  # default (Plane custom field)
      # plane_test_field_name: 'plan de test'        # default
      # extra_prompt: |              # project-specific instructions
      #   - Suis le workflow RPC : SEARCH → REUSE → ADAPT → CREATE
    secrets: inherit
